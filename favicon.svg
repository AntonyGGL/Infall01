<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#101c30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Letter I -->
  <rect x="11" y="8" width="10" height="3" rx="1.5" fill="#ffffff"/>
  <rect x="13.5" y="12" width="5" height="10" rx="1.5" fill="#ffffff"/>
  <rect x="11" y="23" width="10" height="3" rx="1.5" fill="#ffffff"/>
  <!-- Orange dot (brand signature) -->
  <circle cx="24" cy="8" r="2.5" fill="url(#accent)"/>
</svg>
